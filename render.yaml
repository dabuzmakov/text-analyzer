services:
  - type: web
    name: text-analyzer-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: checksPass
    envVars:
      - key: VITE_USE_MOCK_API
        value: "true"
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
