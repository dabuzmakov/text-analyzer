databases:
  - name: text-analyzer-postgres-test
    databaseName: text_analyzer
    user: text_analyzer
    plan: free

services:
  - type: web
    name: text-analyzer-backend-test
    runtime: python
    rootDir: db-test/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: checksPass
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: text-analyzer-postgres-test
          property: connectionString
      - key: CORS_ALLOW_ORIGINS
        sync: false
  - type: web
    name: text-analyzer-frontend-test
    runtime: static
    rootDir: db-test/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: checksPass
    envVars:
      - key: VITE_USE_MOCK_API
        value: "false"
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

