name: DB Migrations (Render Only)

on:
  workflow_dispatch:

jobs:
  migrate-render:
    name: Migrate Render Test DB
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_RENDER_TEST }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply migrations to Render test DB
        run: |
          cd db-test
          bash scripts/db/apply-migrations.sh
