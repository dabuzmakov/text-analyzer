x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app-internal
    logging: *json-logging

  db-migrate:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MIGRATIONS_DIR: database/migrations
    volumes:
      - ../../scripts/db:/workspace/scripts/db:ro
      - ../../database/migrations:/workspace/database/migrations:ro
    command: ["bash", "-lc", "bash scripts/db/apply-migrations.sh"]
    networks:
      - app-internal
    logging: *json-logging

  backend:
    build:
      context: ../..
      dockerfile: deploy/university/docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - backend_corpus_data:/app/corpus_data
      - backend_cache_data:/app/cache_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs').read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-internal
    logging: *json-logging

  frontend:
    build:
      context: ../..
      dockerfile: deploy/university/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL}
        VITE_USE_MOCK_API: "false"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-internal
    logging: *json-logging

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-internal
    logging: *json-logging

volumes:
  postgres_data:
  backend_corpus_data:
  backend_cache_data:
  caddy_data:
  caddy_config:

networks:
  app-internal:
    name: text-analyzer-university
